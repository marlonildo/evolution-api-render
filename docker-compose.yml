version: "3.8"

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: https://SEU-APP.onrender.com
      AUTHENTICATION_API_KEY: minha-chave-super-segura
      DATABASE_ENABLED: "false"
      CACHE_REDIS_ENABLED: "false"
      LOG_LEVEL: ERROR
